spring.application.name=marketplace
# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/wedding_planner_db
spring.datasource.username=postgres
spring.datasource.password=1111
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
jwt.secret=CHANGE_ME_TO_LONG_RANDOM_SECRET_32_CHAR_MINIMUM
jwt.expiration=8640000000000

# ===============================
# BACKUP
# ===============================


# ===== Backup/Restore settings =====
backup.pgDumpPath=C:/Program Files/PostgreSQL/13/bin/pg_dump.exe
backup.psqlPath=C:/Program Files/PostgreSQL/13/bin/psql.exe

backup.host=localhost
backup.port=5432
backup.dbName=wedding_planner_db
backup.user=postgres
backup.password=1111

# ???? ????????? ?????? ?? ???????
backup.dir=C:/temp/wedding_planner_backups

# ???????? ????? (cron): ?????? ???? ? 02:00
backup.cron=0 0 2 * * *


